server {
    listen 80 default_server;
    server_name _;

    # Future domain and HTTPS placeholder:
    # 1. Replace `server_name _;` with your domain.
    # 2. Add `listen 443 ssl http2;`.
    # 3. Configure certificate files and HTTP->HTTPS redirect.

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        proxy_pass http://mall_api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://mall_api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

